<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Digital Clock - Multiple Time Zones</h1>
        
        <div class="controls">
            <input type="text" id="timezoneInput" placeholder="Add timezone (e.g., America/New_York)">
            <button id="addBtn">Add Timezone</button>
            <button id="clearBtn">Clear All</button>
        </div>

        <div class="clock-grid" id="clockGrid">
            <!-- Clock cards will be added here dynamically -->
        </div>

        <div class="preset-timezones">
            <h3>Quick Add:</h3>
            <button class="preset-btn" data-tz="America/New_York">New York</button>
            <button class="preset-btn" data-tz="Europe/London">London</button>
            <button class="preset-btn" data-tz="Europe/Paris">Paris</button>
            <button class="preset-btn" data-tz="Asia/Tokyo">Tokyo</button>
            <button class="preset-btn" data-tz="Asia/Shanghai">Shanghai</button>
            <button class="preset-btn" data-tz="Australia/Sydney">Sydney</button>
            <button class="preset-btn" data-tz="UTC">UTC</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
